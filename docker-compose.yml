version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ctu-chatbot-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: ctu-chatbot-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ctu_chatbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
