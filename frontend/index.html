<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTU Chatbot</title>
    <link rel="icon" type="image/png" href="./assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon" style="background: transparent; border: none; width: 40px; height: 40px;">
                        <img src="./assets/logo.png" alt="Logo"
                            style="width: 100%; height: 100%; object-fit: contain; border-radius: 6px;">
                    </div>
                    <div class="logo-text">
                        <h1>CTU Chatbot</h1>
                        <p>Academic Support</p>
                    </div>
                </div>
            </div>

            <div class="sidebar-nav">
                <button class="new-chat-btn" id="new-chat-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>

                <div class="session-list-container">
                    <div class="session-list-title">Recent</div>
                    <ul class="session-list" id="session-list">
                        <!-- Sessions will be injected here -->
                    </ul>
                </div>

                <ul class="nav-links">
                    <li id="upload-pdf-nav" hidden>
                        <input type="file" id="pdf-upload" accept=".pdf,application/pdf,application/x-pdf"
                            style="display: none">
                        <a href="#" id="upload-pdf-btn">
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                                fill="none">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <span id="upload-text">Upload PDF</span>
                        </a>
                    </li>
                    <li>
                        <a href="support.html">
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                                fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                <line x1="12" y1="17" x2="12.01" y2="17"></line>
                            </svg>
                            <span>Support</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="sidebar-footer">
                <a href="#" class="footer-link" id="login-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                    <span id="login-text">Log in</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="chat-area" id="chat-messages">
                <div class="empty-state" id="empty-state">

                    <div style="width: 120px; height: 120px; margin-bottom: 24px;">
                        <img src="./assets/logo.png" alt="Logo"
                            style="width: 100%; height: 100%; object-fit: contain; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);">
                    </div>

                    <h2>How can I help you today?</h2>
                    <p>Ask me about student loans, social allowances and scholarships.</p>
                </div>
            </div>

            <div class="input-area">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="Message CTU AI..." autocomplete="off" required />
                    <button type="submit" id="send-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
                <div class="footer-text">
                    CTU AI can make mistakes. Consider verifying important academic information.
                </div>
            </div>
        </main>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal-content">
            <button class="close-modal" id="close-auth-modal">&times;</button>
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Login</button>
                <button class="auth-tab" id="tab-register">Register</button>
            </div>

            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <div class="auth-error" id="login-error"></div>
                <button type="submit" class="auth-submit">Log In</button>
            </form>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="register-username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="register-password" required>
                </div>
                <div class="auth-error" id="register-error"></div>
                <button type="submit" class="auth-submit">Register</button>
            </form>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
